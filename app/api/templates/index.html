<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resumen Instructivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        h1, h3 {
            margin-top: 1rem;
        }
    </style>
    <script>
        async function cargarDatosAgrupados() {
            const res = await fetch('/datos');
            const datos = await res.json();
            const contenedor = document.getElementById('contenedor-datos');
            contenedor.innerHTML = '';

            datos.forEach(grupo => {
                const seccion = document.createElement('div');
                seccion.className = 'mb-5';

                const titulo = document.createElement('h3');
                titulo.textContent = `Calibre(s): ${grupo['nombre_calibre']} (Categoría: ${grupo['categoria']})`;
                titulo.className = 'text-primary border-bottom pb-2';
                seccion.appendChild(titulo);

                const tablaWrapper = document.createElement('div');
                tablaWrapper.className = 'table-responsive';

                const tabla = document.createElement('table');
                tabla.className = 'table table-striped table-bordered table-hover table-sm';

                const thead = document.createElement('thead');
                const encabezado = document.createElement('tr');
                Object.keys(grupo).forEach(col => {
                    if (col !== 'nombre_calibre' && col !== 'categoria') {
                        const th = document.createElement('th');
                        th.textContent = col;
                        encabezado.appendChild(th);
                    }
                });
                thead.appendChild(encabezado);
                tabla.appendChild(thead);

                const tbody = document.createElement('tbody');
                const tr = document.createElement('tr');
                Object.entries(grupo).forEach(([col, valor]) => {
                    if (col !== 'nombre_calibre' && col !== 'categoria') {
                        const td = document.createElement('td');
                        td.textContent = valor;
                        tr.appendChild(td);
                    }
                });
                tbody.appendChild(tr);
                tabla.appendChild(tbody);

                tablaWrapper.appendChild(tabla);
                seccion.appendChild(tablaWrapper);
                contenedor.appendChild(seccion);
            });
        }

        setInterval(cargarDatosAgrupados, 60000);
        window.onload = cargarDatosAgrupados;
    </script>
</head>
<body class="container-fluid px-3">
    <h1 class="text-center text-dark">Instructivo Online</h1>
    <div id="contenedor-datos"></div>
</body>
</html>
