<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Configuraciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .pagination { justify-content: center; }
  </style>
</head>
<body class="p-4">
  <div class="container mt-4">
  <div class="row mb-3">
    <div class="col-md-6">
      <label for="tablaConfig">Selecciona una tabla:</label>
      <select id="tablaConfig" class="form-select">
        <option value="">-- Selecciona --</option>
         <option value="especies">Especie</option>
        <option value="calibre">Calibre</option>
        <option value="categoria">Categoría</option>
        <option value="destino">Destino</option>
        <option value="embalaje">Embalaje</option>
        <option value="etiqueta">Etiqueta</option>
        <option value="exportadora">Exportadora</option>
        <option value="altura_pallet">Altura Pallet</option>
        <option value="pallet">Pallet</option>
        <option value="plu">PLU</option>
      </select>
    </div>
  </div>

<!-- Modal de Edicion -->
<div class="modal fade" id="modalEdicion" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="formEdicion">
        <div class="modal-header">
          <h5 class="modal-title">Editar Registro</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Se rellena dinámicamente -->
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Guardar cambios</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>


  <div id="tablaResultados" class="table-responsive"></div>
  <div id="paginacion" class="mt-3"></div>
</div>
</body>
<script src="../assets/js/edicion.js"></script>
<!-- Bootstrap CSS (ya deberías tenerlo en <head>) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap JS con Popper (al final del <body>) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
