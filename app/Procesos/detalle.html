<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle Instructivo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
    }
    .table thead {
      background-color: #4B3F72;
      color: white;
    }
    .table td, .table th {
      vertical-align: middle;
      text-align: center;
    }
    .card-header {
      background: #4B3F72;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container my-5">
    <div id="encabezado"></div>
    <div id="tablaResultado" class="table-responsive mt-4"></div>
  </div>

  <script>
    const URL = "http://192.168.19.4:3003";

    function agruparPorCalibre(data) {
      const grupoMap = {};

      data.forEach(row => {
        const clave =
          row.numero_pedido + '|' +
          row.var_etiquetada + '|' +
          row.embalaje + '|' +
          row.Descripcion_Embalaje + '|' +
          row.Peso_Embalaje + '|' +
          row.Nombre_etiqueta + '|' +
          row.categoria + '|' +
          row.plu + '|' +
          row.nombre_destino + '|' +
          row.ObservacionDetalle;

        if (!grupoMap[clave]) {
          grupoMap[clave] = { ...row, calibres: [] };
        }
        grupoMap[clave].calibres.push(row.nombre_calibre);
      });

      return Object.values(grupoMap);
    }

    async function cargarTabla() {
      const params = new URLSearchParams(window.location.search);
      const id_instructivo = params.get('id_instructivo');

      const res = await fetch(`${URL}/api/detalle?id_instructivo=${id_instructivo}`);
      const data = await res.json();

      if (!data.length) {
        document.getElementById('tablaResultado').innerHTML = '<p class="text-muted">No hay datos.</p>';
        return;
      }

      // ✅ Mostrar encabezado
      const meta = data[0];
      document.getElementById('encabezado').innerHTML = `
        <div class="card">
          <div class="card-header">Información del Instructivo</div>
          <div class="card-body">
            <div class="row g-2">
              <div class="col-md-4"><strong>Exportadora:</strong> ${meta.Nombre_Exportadora}</div>
              <div class="col-md-4"><strong>Especie:</strong> ${meta.especie ?? '(no aplica)'}</div>
              <div class="col-md-4"><strong>N° Instructivo:</strong> ${meta["Numero Instructivo"]}</div>
              <div class="col-md-4"><strong>Versión:</strong> ${meta.version}</div>
              <div class="col-md-8"><strong>Observación Cabecera:</strong> ${meta.ObservacionCabecera ?? ''}</div>
            </div>
          </div>
        </div>
      `;

      // ✅ Agrupar por clave y juntar los calibres
      const agrupado = agruparPorCalibre(data);

      // ✅ Generar tabla
      let tablaHTML = `<table class="table table-bordered table-hover table-sm">
        <thead>
          <tr>
            <th>N° Pedido</th>
            <th>Var. Etiquetada</th>
            <th>Embalaje</th>
            <th>Desc. Embalaje</th>
            <th>Peso</th>
            <th>Etiqueta</th>
            <th>Calibres</th>
            <th>Categoría</th>
            <th>PLU</th>
            <th>Destino</th>
            <th>Obs. Detalle</th>
          </tr>
        </thead>
        <tbody>
          ${agrupado.map(row => `
            <tr>
              <td>${row.numero_pedido}</td>
              <td>${row.var_etiquetada}</td>
              <td>${row.embalaje}</td>
              <td>${row.Descripcion_Embalaje}</td>
              <td>${row.Peso_Embalaje}</td>
              <td>${row.Nombre_etiqueta}</td>
              <td>${row.calibres.join(', ')}</td>
              <td>${row.categoria}</td>
              <td>${row.plu}</td>
              <td>${row.nombre_destino}</td>
              <td>${row.ObservacionDetalle ?? ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

      document.getElementById('tablaResultado').innerHTML = tablaHTML;
    }

    // Cargar tabla al iniciar
    cargarTabla();

    // 🔁 Actualizar automáticamente cada 5 segundos
    setInterval(cargarTabla, 5000);
  </script>
</body>
</html>
